name: Chompo CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / C++23
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CMake and Ninja
        run: python -m pip install --disable-pip-version-check "cmake>=4.2,<5" ninja

      - name: Configure Debug
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build Debug
        run: cmake --build build --parallel

      - name: Run functional tests
        run: ctest --test-dir build --output-on-failure --timeout 20

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log-${{ matrix.os }}
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
          retention-days: 7

  performance:
    name: ubuntu-latest / Release TLE
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install CMake and Ninja
        run: python -m pip install --disable-pip-version-check "cmake>=4.2,<5" ninja

      - name: Configure Release performance build
        run: >-
          cmake -S . -B build-perf -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCHOMPO_ENABLE_PERFORMANCE_TESTS=ON

      - name: Build Release
        run: cmake --build build-perf --parallel

      - name: Run performance/TLE checker
        run: ctest --test-dir build-perf -L performance --output-on-failure
